<!DOCTYPE html>
<html>
  <head>
    <title>Underground Artifact VR</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene webxr="optionalFeatures: hit-test;" renderer="colorManagement: true;">
      
      <a-assets>
        <a-asset-item id="artifact" src="statue.glb"></a-asset-item>
        <img id="graffiti" src="https://i.imgur.com/K6bM5q5.jpeg" crossorigin="anonymous">
      </a-assets>

      <a-light type="ambient" color="#111" intensity="0.5"></a-light>
      
      <a-light type="point" 
               color="#f1c40f" 
               intensity="2" 
               position="0 4 -3" 
               animation="property: intensity; from: 0; to: 2; dur: 8000; dir: alternate; loop: true; easing: easeInOutSine">
      </a-light>

      <a-plane position="0 0 0" rotation="-90 0 0" width="30" height="30" color="#333" roughness="1"></a-plane>
      
      <a-plane position="0 5 -10" rotation="0 0 0" width="30" height="10" src="#graffiti" repeat="4 2"></a-plane>
      
      <a-plane position="15 5 0" rotation="0 -90 0" width="30" height="10" src="#graffiti" repeat="4 2"></a-plane>
      
      <a-plane position="0 10 0" rotation="90 0 0" width="30" height="30" color="#1a1a1a"></a-plane>

      <a-entity position="0 0 -4">
        <a-box position="0 0.5 0" width="1" height="1" depth="1" color="#5a2e1d" roughness="1"></a-box>
        
        <a-entity gltf-model="#artifact" 
                  position="0 1 0" 
                  scale="1 1 1">
        </a-entity>
      </a-entity>

      <a-entity camera look-controls wasd-controls position="0 1.6 0">
        <a-cursor color="white"></a-cursor>
      </a-entity>

    </a-scene>
  </body>
</html>
