<!DOCTYPE html>
<html>
  <head>
    <title>Ancient Artifact VR</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.7/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene webxr="optionalFeatures:  hit-test;" arjs>
      
      <a-entity environment="preset: egypt; shadow: true; dressingAmount: 10"></a-entity>

      <a-assets>
        <a-asset-item id="myModel" src="statue.glb"></a-asset-item>
      </a-assets>

      <a-entity gltf-model="#myModel" 
                position="0 1.2 -3" 
                scale="1 1 1" 
                animation="property: rotation; to: 0 360 0; loop: true; dur: 20000">
      </a-entity>

      <a-entity camera look-controls wasd-controls position="0 1.6 0">
        <a-cursor color="yellow"></a-cursor>
      </a-entity>

    </a-scene>
  </body>
</html>
