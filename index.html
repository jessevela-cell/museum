<!DOCTYPE html>
<html>
  <head>
    <title>High-Fidelity Underpass Museum</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.7/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene 
      renderer="antialias: true; colorManagement: true; exposure: 0.8; toneMapping: ACESFilmic;"
      shadow="type: pcfsoft"
      fog="type: exponential; color: #050505; density: 0.08">

      <a-assets>
        <a-asset-item id="artifact" src="statue.glb"></a-asset-item>
        <img id="concreteTex" src="concrete.jpg">
        <img id="vinesTex" src="vines.png">
        <img id="concreteNormal" src="https://i.imgur.com/71EwS0p.jpeg">
      </a-assets>

      <a-light type="ambient" color="#222" intensity="0.3"></a-light>
      
      <a-light type="point" 
               color="#ffaa00" 
               intensity="2" 
               position="0 6 -4" 
               castShadow="true"
               animation="property: intensity; from: 0.05; to: 2.5; dur: 6000; dir: alternate; loop: true; easing: easeInOutQuad">
      </a-light>

      <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" 
               material="src: #concreteTex; normalMap: #concreteNormal; repeat: 20 20; roughness: 0.9"
               shadow="receive: true"></a-plane>
      
      <a-box position="-8 5 -5" width="1" height="10" depth="40" material="src: #concreteTex; repeat: 8 2; roughness: 0.8" shadow="cast: true; receive: true"></a-box>
      <a-box position="8 5 -5" width="1" height="10" depth="40" material="src: #concreteTex; repeat: 8 2; roughness: 0.8" shadow="cast: true; receive: true"></a-box>
      <a-box position="0 5 -15" width="16" height="10" depth="1" material="src: #concreteTex; repeat: 4 2; roughness: 0.8" shadow="cast: true; receive: true"></a-box>

      <a-box position="0 10 -4" width="16" height="1.5" depth="3" material="src: #concreteTex; repeat: 4 0.5" shadow="cast: true"></a-box>
      <a-box position="0 10 -9" width="16" height="1.5" depth="3" material="src: #concreteTex; repeat: 4 0.5" shadow="cast: true"></a-box>

      <a-plane position="-7.4 6 -3" rotation="0 90 0" width="8" height="6" material="src: #vinesTex; transparent: true; alphaTest: 0.5; side: double"></a-plane>
      <a-plane position="7.4 6 -7" rotation="0 -90 0" width="8" height="6" material="src: #vinesTex; transparent: true; alphaTest: 0.5; side: double"></a-plane>

      <a-entity position="0 0 -6">
        <a-box position="0 0.5 0" width="1.4" height="1.1" depth="1.4" 
               material="src: #concreteTex; roughness: 0.6; metalness: 0.1" 
               shadow="cast: true; receive: true"></a-box>
        
        <a-entity gltf-model="#artifact" 
                  position="0 1.5 0" 
                  scale="1.2 1.2 1.2"
                  shadow="cast: true"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
        </a-entity>
      </a-entity>

      <a-entity camera look-controls wasd-controls position="0 1.6 2">
        <a-cursor color="#ffaa00" fuse="false"></a-cursor>
      </a-entity>

    </a-scene>
  </body>
</html>
