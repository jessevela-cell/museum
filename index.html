<!DOCTYPE html>
<html>
  <head>
    <title>High-Fidelity Underpass Gallery</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  </head>
  <body style="background-color: #000;">
    <a-scene 
      renderer="antialias: true; colorManagement: true; sortObjects: true; toneMapping: ACESFilmic; exposure: 0.9;"
      shadow="type: pcfsoft"
      fog="type: exponential; color: #080808; density: 0.12;"
      webxr="optionalFeatures: hit-test;">

      <a-assets>
        <a-asset-item id="m1" src="arca.glb"></a-asset-item>
        <a-asset-item id="m2" src="dia.glb"></a-asset-item>
        <a-asset-item id="m3" src="nmah-1997_0097_0721-virgen_de_monserrate-100k-2048_std_draco.glb"></a-asset-item>
        <a-asset-item id="m4" src="nmah-1997_0097_1082-cuatro-150k-4096_std_draco.glb"></a-asset-item>
        <a-asset-item id="m5" src="nmah-1997_0097_1083-pandereta-100k-2048_std_draco.glb"></a-asset-item>
        <a-asset-item id="m6" src="nmah-2014_0138_02-i01-baca_boot_combined-150k-4096_std.glb"></a-asset-item>
        
        <img id="concrete" src="thumbnail.jpg">
        <img id="vines" src="vines.jpg">
      </a-assets>

      <a-light type="ambient" color="#222" intensity="0.2"></a-light>
      
      <a-light type="point" color="#44aaff" intensity="2" position="0 6 -8" castShadow="true"
               animation="property: intensity; from: 0; to: 3; dur: 4000; dir: alternate; loop: true; easing: easeInOutSine">
      </a-light>

      <a-plane position="0 0 -10" rotation="-90 0 0" width="40" height="60" 
               material="src: #concrete; repeat: 10 15; roughness: 0.9; metalness: 0.1" 
               shadow="receive: true"></a-plane>

      <a-box position="-8 5 -10" width="1" height="12" depth="40" material="src: #concrete; repeat: 1 5" shadow="cast: true; receive: true"></a-box>
      <a-box position="8 5 -10" width="1" height="12" depth="40" material="src: #concrete; repeat: 1 5" shadow="cast: true; receive: true"></a-box>

      <a-box position="0 11 -4" width="16" height="2" depth="4" material="src: #concrete; repeat: 4 1" shadow="cast: true"></a-box>
      <a-box position="0 11 -12" width="16" height="2" depth="4" material="src: #concrete; repeat: 4 1" shadow="cast: true"></a-box>

      <a-plane position="-7.4 6 -4" rotation="0 90 0" width="12" height="8" material="src: #vines; transparent: true; alphaTest: 0.5; side: double"></a-plane>
      <a-plane position="7.4 6 -10" rotation="0 -90 0" width="12" height="8" material="src: #vines; transparent: true; alphaTest: 0.5; side: double"></a-plane>

      <a-entity position="-4 0 -5">
        <a-box position="0 0.5 0" width="1.2" height="1" depth="1.2" src="#concrete" shadow="cast: true"></a-box>
        <a-entity gltf-model="#m1" position="0 1.3 0" scale="1 1 1" shadow="cast: true" animation="property: rotation; to: 0 360 0; loop: true; dur: 12000"></a-entity>
      </a-entity>
